<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор заказов</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Левая панель - ввод -->
        <div class="input-panel">
            <h2>Запрос</h2>
            <textarea id="inputJson" placeholder="Вставьте сюда JSON запроса..."></textarea>
        </div>
        
        <!-- Правая панель -->
        <div class="right-panel">
            <!-- Блок суммового анализа -->
            <div class="sum-panel">
                <h2>Суммы</h2>
                <div id="sumContent" class="sum-content"></div>
            </div>
            
            <!-- Блок проблем -->
            <div class="problems-panel">
                <h2>
                    Проблемы
                    <span id="problemsCount" class="problems-count" style="display: none;">0</span>
                </h2>
                <div id="problemsList" class="problems-list">
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <div>Вставьте запрос и нажмите "Анализировать"</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        // Автоматический анализ при изменении текста
        let debounceTimer;
        document.getElementById('inputJson').addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (this.value.trim()) {
                    analyzeOrder();
                } else {
                    clearAll();
                }
            }, 300);
        });
    </script>
</body>
</html>
